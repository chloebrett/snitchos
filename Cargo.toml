[workspace]
resolver = "2"
members = ["kernel", "kernel-core", "protocol", "collector", "xtask", "itest-harness"]
# `learning/` is a separate, host-targeted workspace of standalone "toy"
# crates for understanding kernel concepts in isolation. Excluded so it
# never participates in the no_std/riscv64 kernel build.
exclude = ["learning"]

# Host-crate lint policy. Opt in per crate via `[lints] workspace = true`
# (kernel-core, protocol, collector, xtask, itest-harness). Pedantic as a
# whole is `warn` — surface idiom/bug hints without blocking the red-green
# loop — with the boilerplate-tax members turned back off. The bare-metal
# `kernel` crate does NOT use this; it takes a smaller cast-only set (see
# kernel/Cargo.toml), because full pedantic fights register/address idioms.
[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
missing_errors_doc = "allow"
missing_panics_doc = "allow"
module_name_repetitions = "allow"
must_use_candidate = "allow"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"

[patch.crates-io]
linked_list_allocator = { path = "vendor/linked_list_allocator" }
