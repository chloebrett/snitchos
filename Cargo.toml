[workspace]
resolver = "2"
members = ["kernel", "kernel-core", "protocol", "collector", "xtask", "itest-harness"]
# `learning/` is a separate, host-targeted workspace of standalone "toy"
# crates for understanding kernel concepts in isolation. Excluded so it
# never participates in the no_std/riscv64 kernel build.
exclude = ["learning"]

# Host-crate lint policy. Opt in per crate via `[lints] workspace = true`
# (kernel-core, protocol, collector, xtask, itest-harness). Pedantic as a
# whole is `warn` — surface idiom hints without blocking the red-green loop.
# The bare-metal `kernel` crate does NOT opt in (full pedantic fights
# register/address idioms).
#
# Allowed members are the boilerplate-tax ones and the `cast_*` family. The
# casts earned their `allow` empirically: this codebase does so much
# legitimate address/size/duration `as` math that the cast lints fire ~200×
# and are overwhelmingly correct-by-context — a blanket warn there is noise,
# not signal. Audit a specific suspect truncation with `try_into()` instead.
[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
missing_errors_doc = "allow"
missing_panics_doc = "allow"
module_name_repetitions = "allow"
must_use_candidate = "allow"
cast_possible_truncation = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"
cast_possible_wrap = "allow"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"

[patch.crates-io]
linked_list_allocator = { path = "vendor/linked_list_allocator" }
