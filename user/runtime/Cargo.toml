[package]
name = "snitchos-user"
version = "0.0.1"
edition = "2024"
publish = false

# The SnitchOS userspace runtime: crt0 (`_start`), panic handler, and typed
# capability bindings shared by every U-mode program. Bare-metal, builds only
# for riscv64gc-unknown-none-elf (its `start.S` is RISC-V asm). Program crates
# depend on this and provide only `fn main`.

[dependencies]
snitchos-abi = { path = "../../abi" }
# Userspace heap: `talc`, a multi-region allocator whose `OomHandler` is the
# grow-on-demand hook — on allocation failure it `map_anon`s a fresh region and
# `claim`s it. Multi-region (claims disjoint spans) is why this is `talc` and
# not the kernel's single-region `linked_list_allocator`.
# `lock_api` gives the `Talck` GlobalAlloc wrapper; we skip the default
# `allocator`/`nightly_api` features (they need nightly) and supply our own
# single-threaded no-op lock (`locking::AssumeUnlockable`).
talc = { version = "4", default-features = false, features = ["lock_api"] }
