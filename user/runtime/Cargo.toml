[package]
name = "snitchos-user"
version = "0.0.1"
edition = "2024"
publish = false

# The SnitchOS userspace runtime: crt0 (`_start`), panic handler, and typed
# capability bindings shared by every U-mode program. Bare-metal, builds only
# for riscv64gc-unknown-none-elf (its `start.S` is RISC-V asm). Program crates
# depend on this and provide only `rust_main`.

[dependencies]
snitchos-abi = { path = "../../abi" }
# Userspace heap: a `LockedHeap` global allocator (a `Spinlock<Heap>` — the lock
# gives the `#[global_allocator]` static its interior mutability) over a static
# `.bss` arena. Same vendored fork the kernel uses (workspace `[patch]`); its
# `Heap` supports `extend`, so growth later (a brk syscall) needs no swap.
linked_list_allocator = { version = "0.10" }
