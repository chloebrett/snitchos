[package]
name = "fs"
version = "0.0.1"
edition = "2024"
publish = false

# Bare-metal U-mode FS server + client (the v0.10 RAMfs component). Like
# `hello`, it only builds for riscv64gc-unknown-none-elf (its own `user.ld`
# links it at a fixed low-half VA). Built via `kernel/build.rs`.
#
# It *does* opt into the workspace pedantic lints (below), despite being
# bare-metal: measured, it produces zero register/address-idiom hits — the
# workspace's `cast_*` / `unreadable_literal` allows already absorb that
# friction. Being bare-metal is not itself a reason to opt out.
[dependencies]
snitchos-user = { path = "../runtime" }
snitchos-std = { path = "../std" }
# `#[entry(needs = […])]` emits a `hitch`-encoded `.snitch.iface` note (the FS
# client declares its authority needs). `default-features = false` — no schema
# derive is needed (a needs-only note carries no in/out types).
hitch = { path = "../../hitch", default-features = false }
fs-core = { path = "../../fs-core" }
fs-proto = { path = "../../fs-proto" }
ramfs = { path = "../../ramfs" }

# Host-side (build.rs) ELF parsing: extract a seeded program's `.snitch.iface`
# note into its `user.iface` xattr. `read`+`elf` only — no write, no other formats.
[build-dependencies]
object = { version = "0.36", default-features = false, features = ["read_core", "elf", "std"] }

[lints]
workspace = true

[lib]
# No doctests in this crate; doctest=false keeps `cargo test` off the slow
# rustdoc doc-test compile. The gate runs nextest (never runs doctests) — see
# CLAUDE.md "use nextest". Add doctest=false to any new lib crate too.
doctest = false
