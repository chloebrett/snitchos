# Exclude kernel crates from mutation — they target RISC-V (no_std) and
# cannot be compiled or tested on the host. Use `cargo xtask mutants`
# (which passes -p collector -p protocol) rather than bare `cargo mutants`.
exclude_globs = ["kernel/**"]

# The warned_no_hello flag gates a one-shot stderr warning; testing it
# would require capturing stderr. Not worth the complexity.
exclude_re = [
  # One-shot stderr warning; testing it requires capturing stderr.
  "delete ! in State::handle",
  # Equivalent mutant: `first_t = t` when `t == first_t` is a no-op.
  "replace < with <= in State::advance_anchor",
  # Equivalent mutants in mmu.rs: R,W,X,G are bits 1,2,3,5 (disjoint),
  # so | and ^ produce the same value in rwxg().
  "replace \\| with \\^ in PtePerms::rwxg",
  # Equivalent mutants: PPN occupies bits 53:10 and flag bits are 7:0 —
  # structurally disjoint for any page-aligned PA, so | and ^ are identical.
  "replace \\| with \\^ in leaf_pte",
  "replace \\| with \\^ in branch_pte",
  # Equivalent mutant: 1 << 0 == 1 >> 0 == 1 — same constant either way.
  "replace << with >> in leaf_pte",
  # Non-deterministic: random_trace_id uses fastrand and its output cannot
  # be asserted. The linter rewrites #[mutants::skip] to
  # #[cfg_attr(test, mutants::skip)] which cargo-mutants doesn't see, so
  # we exclude via pattern instead.
  "replace random_trace_id ->",
]
