# Exclude kernel crates from mutation — they target RISC-V (no_std) and
# cannot be compiled or tested on the host. Use `cargo xtask mutants`
# (which passes -p collector -p protocol) rather than bare `cargo mutants`.
exclude_globs = ["kernel/**"]

# The warned_no_hello flag gates a one-shot stderr warning; testing it
# would require capturing stderr. Not worth the complexity.
exclude_re = [
  # One-shot stderr warning; testing it requires capturing stderr.
  "delete ! in State::handle",
  # Equivalent mutant: `first_t = t` when `t == first_t` is a no-op.
  "replace < with <= in State::advance_anchor",
]
