[package]
name = "xtask"
version = "0.0.1"
edition = "2024"
publish = false

[dependencies]
clap = { version = "4", features = ["derive"] }
# Diagram generation lib — xtask provides the I/O (cargo metadata, capture,
# --check diffs, file writes) and delegates every projection here.
diagram = { path = "../diagram" }
protocol = { path = "../protocol", features = ["std"] }
# The kernel↔user ABI — scenarios assert on `Syscall::*` by name, not a magic number.
snitchos-abi = { path = "../abi" }
# FS protocol — scenarios assert on the demo marker sentinels by name, shared
# with the `user/fs` client that emits them (see `fs_proto::markers`).
fs-proto = { path = "../fs-proto" }
itest-harness = { path = "../itest-harness" }
# The snemu emulator, driven in-process for the differential oracle
# (`snemu-diff`): boot the same kernel under snemu and diff its frames vs QEMU.
snemu = { path = "../snemu" }
# Sonnet-assisted staging: pure prompt/parse core; xtask owns the git I/O.
snip = { path = "../snip" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ctrlc = "3"
# ELF symbol-table parsing for the guest instret profiler (`snemu-profile`):
# map executed PCs back to kernel function names. Host-only dev tooling; the
# `read` feature (no write) keeps it lean.
object = { version = "0.36", default-features = false, features = ["read", "std", "elf"] }
# Demangle Rust symbol names in the profiler report (`_ZN6kernel...` → readable).
rustc-demangle = "0.1"

[dev-dependencies]
# Encode `Frame`s into a byte stream for the incremental-decoder unit test
# (mirrors the on-wire postcard encoding the kernel produces).
postcard = { version = "1", features = ["alloc"] }

[lints]
workspace = true
