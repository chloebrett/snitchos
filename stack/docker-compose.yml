# SnitchOS observability stack.
#
# - Tempo:      OTLP/HTTP receiver + trace storage.
# - Prometheus: scrapes the collector's /metrics endpoint.
# - Loki:       log aggregation (collector pushes one line per span).
# - Grafana:    dashboards (anonymous admin access for local dev).
#
# Bring up with `cargo xtask stack up`. The collector running on the
# host pushes traces to Tempo and exposes metrics for Prometheus.

services:
  tempo:
    image: grafana/tempo:2.6.0
    container_name: snitchos-tempo
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana queries here).
      - "4318:4318"   # OTLP/HTTP receiver (collector POSTs here).
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: snitchos-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=24h
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    extra_hosts:
      # Lets `host.docker.internal` resolve to the host on Linux too
      # (macOS docker desktop sets this automatically).
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:3.0.0
    container_name: snitchos-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"   # HTTP API — collector POSTs spans here.
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: snitchos-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - tempo
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  tempo-data:
  prometheus-data:
  grafana-data:
  loki-data:
